name: Deploy to DigitalOcean

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          DO_USER: ${{ secrets.DO_USER }}
          DO_HOST: ${{ secrets.DO_HOST }}
          APP_DIR: ${{ secrets.DO_APP_DIR }}
        run: |
          ssh "$DO_USER@$DO_HOST" "APP_DIR='${APP_DIR:-/opt/prepaid-credit-tracker}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${APP_DIR:-/opt/prepaid-credit-tracker}"
          docker compose pull
          docker compose up -d
          docker image prune -f
          docker compose ps
          REMOTE
