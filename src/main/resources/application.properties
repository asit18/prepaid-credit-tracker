spring.application.name=prepaid-credit-tracker
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework
app.time-zone=${APP_TIME_ZONE:America/Los_Angeles}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/credittracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:credittracker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=false

spring.thymeleaf.cache=false
spring.jackson.time-zone=${app.time-zone}
spring.jackson.serialization.write-dates-as-timestamps=false

app.auth.google-enabled=${APP_AUTH_GOOGLE_ENABLED:false}
app.admin.seed-email=${APP_ADMIN_SEED_EMAIL:admin@example.com}
app.local-admin.email=${APP_LOCAL_ADMIN_EMAIL:admin@example.com}
app.local-admin.password=${APP_LOCAL_ADMIN_PASSWORD:}
