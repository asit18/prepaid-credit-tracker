spring.application.name=prepaid-credit-tracker
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework
app.time-zone=${APP_TIME_ZONE:America/Los_Angeles}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/credittracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:credittracker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=false

spring.thymeleaf.cache=false
spring.jackson.time-zone=${app.time-zone}
spring.jackson.serialization.write-dates-as-timestamps=false

app.auth.google-enabled=${APP_AUTH_GOOGLE_ENABLED:false}
app.admin.seed-email=${APP_ADMIN_SEED_EMAIL:admin@example.com}
app.local-admin.email=${APP_LOCAL_ADMIN_EMAIL:admin@example.com}
app.local-admin.password=${APP_LOCAL_ADMIN_PASSWORD:}
app.security.jwt.issuer=${APP_JWT_ISSUER:Prepaid Credit Tracker}
app.security.jwt.secret=${APP_JWT_SECRET:}
app.security.jwt.access-token-ttl-minutes=${APP_JWT_ACCESS_TOKEN_TTL_MINUTES:60}
app.security.jwt.mfa-temp-token-ttl-minutes=${APP_JWT_MFA_TEMP_TOKEN_TTL_MINUTES:5}
app.security.encryption.aes-key-base64=${APP_AES_KEY_BASE64:}
app.security.mfa.issuer=${APP_MFA_ISSUER:Prepaid Credit Tracker}
app.security.mfa.digits=6
app.security.mfa.time-step-seconds=30
app.security.mfa.allowed-window=1
app.security.mfa.backup-code-count=10
app.security.mfa.backup-code-length=10
app.security.mfa.max-invalid-attempts=5
app.security.mfa.lockout-minutes=10
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8090}
app.mail.from=${APP_MAIL_FROM:no-reply@example.com}
