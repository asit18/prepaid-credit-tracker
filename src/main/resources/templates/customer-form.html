<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Enroll Customer')}"></head>
<body>
<div class="app">
    <aside th:replace="~{fragments :: sidebar}"></aside>
    <main class="content">
        <h1>Enroll Customer</h1>
        <div th:if="${error}" class="alert error" th:text="${error}"></div>
        <form class="card" th:action="@{/customers}" method="post">
            <label>Name</label><input name="name" required>
            <label>Email</label><input name="email" type="email">
            <label>Phone</label><input name="phone" required>
            <label>Address</label><textarea name="address"></textarea>
            <h2>Additional Contacts</h2>
            <div data-contacts></div>
            <button type="button" class="secondary" onclick="addContactRow()">Add Contact</button>
            <button type="submit" class="green">Save Customer <span class="spinner"></span></button>
        </form>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
