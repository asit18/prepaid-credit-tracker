<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Credit Management')}"></head>
<body>
<div class="app">
    <aside th:replace="~{fragments :: sidebar}"></aside>
    <main class="content">
        <h1>Customer Lookup & Credit Management</h1>
        <div th:if="${error}" class="alert error" th:text="${error}"></div>
        <section class="card">
            <form th:action="@{/customers/manage}" method="get" class="lookup-form">
                <label>Search customer</label>
                <div class="inline-search">
                <input name="search" data-customer-typeahead th:value="${search}" placeholder="Type name or phone number" autocomplete="off">
                    <button class="secondary">Search</button>
                </div>
            </form>
            <div class="typeahead-results mobile-stack" data-customer-results>
                <p th:if="${customer == null && (search == null || #strings.isEmpty(search))}" class="empty">Start typing a customer name or phone number.</p>
                <p th:if="${search != null && !#strings.isEmpty(search) && #lists.isEmpty(customers)}" class="empty">No matching customers found.</p>
                <a data-customer-option th:each="c : ${customers}" class="customer-result" th:href="@{/customers/manage(customerId=${c.id})}">
                    <strong th:text="${c.name}"></strong>
                    <span th:text="${c.phone}"></span>
                </a>
            </div>
        </section>
        <div th:if="${customer != null}">
            <section class="card" style="margin-top:18px">
                <div class="section-heading">
                    <div>
                        <h2><a th:href="@{/customers/{id}/edit(id=${customer.id})}" th:text="${customer.name}">Customer</a></h2>
                        <p class="muted" th:text="${lastVisitDate == null ? 'Last visit: No visits yet' : 'Last visit: ' + @appDateTime.format(lastVisitDate)}"></p>
                    </div>
                </div>
                <p class="muted">
                    <span th:text="${customer.phone ?: 'No phone'}"></span>
                    <span> | </span>
                    <span th:text="${customer.email ?: 'No email'}"></span>
                    <span> | </span>
                    <span th:text="${#lists.isEmpty(customer.contacts) ? 'No contact' : customer.contacts[0].name}"></span>
                </p>
                <p th:if="${#lists.isEmpty(customer.contacts)}" class="empty">No contacts yet.</p>
                <ul><li th:each="contact : ${customer.contacts}" th:text="${contact.name + ' ' + (contact.phone ?: '') + ' ' + (contact.relationship ?: '')}"></li></ul>
            </section>
            <section class="card" style="margin-top:18px">
                <h2>Credit Summary</h2>
                <div class="balance-summary">
                    <div th:each="b : ${balances}" th:class="${b.balance.compareTo(T(java.math.BigDecimal).TEN) <= 0 ? 'balance-chip balance-warning' : 'balance-chip'}">
                        <strong th:text="${b.productName}"></strong>
                        <span th:text="${@appDateTime.formatUnits(b.balance) + ' ' + b.unitLabel}"></span>
                        <small th:text="${'Unit: ' + b.unitLabel}"></small>
                    </div>
                </div>

                <div class="credit-control">
                    <label>Product</label>
                    <select data-credit-product>
                        <option th:each="b : ${balances}"
                                th:value="${b.productId}"
                                th:data-price="${@appDateTime.formatPrice(b.currentPrice)}"
                                th:data-balance="${@appDateTime.formatUnits(b.balance)}"
                                th:data-unit-label="${b.unitLabel}"
                                th:text="${b.productName + ' - ' + @appDateTime.formatUnits(b.balance) + ' ' + b.unitLabel}">
                        </option>
                    </select>

                    <div class="action-radios" role="radiogroup" aria-label="Credit action">
                        <label><input type="radio" name="creditAction" value="CONSUMPTION" checked> Record Consumption</label>
                        <label><input type="radio" name="creditAction" value="PURCHASE"> Add Credits</label>
                        <label><input type="radio" name="creditAction" value="ADJUSTMENT"> Adjust Credits</label>
                    </div>

                    <div class="action-panel" data-action-panel="CONSUMPTION">
                        <form th:action="@{/customers/{id}/transactions(id=${customer.id})}" method="post" data-confirm="Confirm this consumption?">
                            <input type="hidden" name="productId" data-selected-product-id>
                            <input type="hidden" name="transactionType" value="CONSUMPTION">
                            <label>Whole units consumed</label><input name="units" type="number" min="1" step="1" data-consumption-units required>
                            <p class="muted" data-balance-limit></p>
                            <label>Notes</label><input name="notes">
                            <button class="small">Confirm <span class="spinner"></span></button>
                        </form>
                    </div>

                    <div class="action-panel hidden" data-action-panel="PURCHASE">
                        <form th:action="@{/customers/{id}/transactions(id=${customer.id})}" method="post" data-confirm="Confirm this payment credit?">
                            <input type="hidden" name="productId" data-selected-product-id>
                            <input type="hidden" name="transactionType" value="PURCHASE">
                            <label>Amount paid</label><input name="amountPaid" type="number" min="0.01" step="0.01" required>
                            <p class="muted">Current price: <span data-current-price></span> per unit</p>
                            <label>Notes</label><input name="notes">
                            <button class="small">Confirm <span class="spinner"></span></button>
                        </form>
                    </div>

                    <div class="action-panel hidden" data-action-panel="ADJUSTMENT">
                        <form th:action="@{/customers/{id}/transactions(id=${customer.id})}" method="post" data-confirm="Confirm this credit adjustment?">
                            <input type="hidden" name="productId" data-selected-product-id>
                            <input type="hidden" name="transactionType" value="ADJUSTMENT">
                            <label>Whole units signed</label><input name="units" type="number" step="1" data-adjustment-units required>
                            <p class="muted" data-adjustment-limit></p>
                            <label>Reason</label><input name="notes" required>
                            <button class="small">Confirm <span class="spinner"></span></button>
                        </form>
                    </div>
                </div>
            </section>
            <section class="card" style="margin-top:18px">
                <h2>Transaction History</h2>
                <p th:if="${#lists.isEmpty(transactions)}" class="empty">No transactions yet. Add the first payment above.</p>
                <div class="table-wrap" th:if="${!#lists.isEmpty(transactions)}"><table>
                    <tr><th>Date</th><th>Product</th><th>Type</th><th>Units</th><th>Amount</th><th>Created By</th></tr>
                    <tr th:each="tx : ${transactions}">
                        <td th:text="${@appDateTime.format(tx.transactionDate)}"></td><td th:text="${tx.product.name}"></td><td th:text="${tx.transactionType}"></td>
                        <td th:class="${tx.units.signum() < 0 ? 'negative' : 'positive'}" th:text="${@appDateTime.formatUnits(tx.units)}"></td>
                        <td th:text="${tx.amountPaid ?: '-'}"></td><td th:text="${tx.createdBy}"></td>
                    </tr>
                </table></div>
            </section>
        </div>
    </main>
</div>
<div th:if="${toast}" class="toast" th:text="${toast}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
