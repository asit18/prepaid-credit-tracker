<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Dashboard')}"></head>
<body>
<div class="app">
    <aside th:replace="~{fragments :: sidebar}"></aside>
    <main class="content">
        <div th:replace="~{fragments :: topbar('Dashboard')}"></div>
        <div class="tile-grid">
            <a class="tile" th:href="@{/customers/new}">
                <strong>Add Customer</strong>
                <span>Create a new customer profile</span>
            </a>
            <a class="tile" th:href="@{/customers/manage}">
                <strong>Customer Search</strong>
                <span>Find customers by name or phone</span>
            </a>
            <a class="tile" th:href="@{/reports}">
                <strong>Transaction History</strong>
                <span>Review credits, payments, and consumption</span>
            </a>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
