<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Dashboard')}"></head>
<body>
<div class="app">
    <aside th:replace="~{fragments :: sidebar}"></aside>
    <main class="content">
        <div class="topbar"><h1>Dashboard</h1><a class="btn secondary" th:href="@{/logout}">Sign out</a></div>
        <div class="grid">
            <section class="card"><div class="muted">Total Customers</div><div class="stat" th:text="${customerCount}">0</div></section>
            <section class="card"><div class="muted">Active Products</div><div class="stat" th:text="${productCount}">0</div></section>
            <section class="card"><div class="muted">Credits Issued Today</div><div class="stat positive" th:text="${issuedToday}">0</div></section>
            <section class="card"><div class="muted">Low Balance Alerts</div><div class="stat negative" th:text="${lowBalanceCount}">0</div></section>
        </div>
        <section class="card" style="margin-top:18px">
            <h2>Quick Links</h2>
            <p>
                <a class="btn" th:href="@{/customers/new}">Enroll Customer</a>
                <a class="btn" th:href="@{/customers/manage}">Manage Credits</a>
                <a class="btn" th:href="@{/products}">Products</a>
                <a class="btn" th:href="@{/reports}">Reports</a>
            </p>
        </section>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
