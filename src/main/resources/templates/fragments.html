<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | ' + ${businessName}">Prepaid Credit Tracker</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<div class="topbar" th:fragment="topbar(title)">
    <h1 th:text="${title}">Page</h1>
    <div class="topbar-user" th:if="${currentAdminName != null}" th:text="${currentAdminName}">Admin User</div>
</div>
<aside class="sidebar" th:fragment="sidebar">
    <div class="mobile-header">
        <div class="brand" th:text="${businessName}">Prepaid Credit Tracker</div>
        <button type="button" class="menu-toggle" aria-label="Open menu" aria-expanded="false" data-menu-toggle>
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
    <div class="brand desktop-brand" th:text="${businessName}">Prepaid Credit Tracker</div>
    <nav class="nav">
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/customers/new}">Add Customer</a>
        <a th:href="@{/customers/manage}">Credits</a>
        <a sec:authorize="hasRole('OWNER')" th:href="@{/products}">Products</a>
        <a th:href="@{/reports}">Transaction History</a>
        <a th:href="@{/credits-balance}">Credits Balance</a>
        <a sec:authorize="hasRole('OWNER')" th:href="@{/admins}">Admins</a>
        <a sec:authorize="hasRole('OWNER')" th:href="@{/settings}">Settings</a>
        <a sec:authorize="hasRole('OWNER')" th:href="@{/settings/security}">Security</a>
        <a th:href="@{/logout}">Sign Out</a>
    </nav>
</aside>
</html>
