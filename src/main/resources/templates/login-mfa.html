<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'MFA Verification | ' + ${businessName}">MFA Verification</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">
<main class="login-card">
    <h1>Verification</h1>
    <p class="muted">Enter the 6-digit code from your authenticator app.</p>
    <div th:if="${error}" class="alert error" th:text="${error}"></div>
    <form th:action="@{/login/mfa}" method="post">
        <label>Authenticator Code</label>
        <input name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required>
        <button type="submit">Verify <span class="spinner"></span></button>
    </form>
    <form th:action="@{/logout}" method="post" style="margin-top:12px">
        <button class="secondary" type="submit">Cancel</button>
    </form>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
