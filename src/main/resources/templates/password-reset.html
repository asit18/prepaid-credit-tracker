<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'Change Password | ' + ${businessName}">Change Password</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">
<main class="login-card">
    <h1>Change Password</h1>
    <div th:if="${error}" class="alert error" th:text="${error}"></div>
    <p th:if="${!valid}" class="empty">This password reset link is invalid or expired.</p>
    <form th:if="${valid}" th:action="@{/password-reset}" method="post">
        <input type="hidden" name="token" th:value="${token}">
        <label>New Password</label>
        <input name="password" type="password" minlength="8" required>
        <label>Confirm Password</label>
        <input name="confirmPassword" type="password" minlength="8" required>
        <button type="submit">Update Password <span class="spinner"></span></button>
    </form>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
