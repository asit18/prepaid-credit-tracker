<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Transaction History')}"></head>
<body>
<div class="app">
    <aside th:replace="~{fragments :: sidebar}"></aside>
    <main class="content">
        <div th:replace="~{fragments :: topbar('Transaction History')}"></div>
        <section class="card">
            <form th:action="@{/reports}" method="get" class="inline">
                <div><label>From</label><input name="from" type="date" th:value="${from}"></div>
                <div><label>To</label><input name="to" type="date" th:value="${to}"></div>
                <div><label>Customer</label><select name="customerId"><option value="">All</option><option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.name}" th:selected="${selectedCustomerId != null and selectedCustomerId == c.id}"></option></select></div>
                <div><label>Product</label><select name="productId"><option value="">All</option><option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}" th:selected="${selectedProductId != null and selectedProductId == p.id}"></option></select></div>
                <div><label>Type</label><select name="type"><option value="">All</option><option th:each="t : ${types}" th:value="${t}" th:text="${t}" th:selected="${selectedType != null and selectedType == t}"></option></select></div>
                <button>Search <span class="spinner"></span></button>
                <a class="btn secondary" th:href="@{/reports.csv(from=${from},to=${to},customerId=${selectedCustomerId},productId=${selectedProductId},type=${selectedType})}">Export CSV</a>
            </form>
        </section>
        <section class="card" style="margin-top:18px">
            <h2>Transactions</h2>
            <div class="pagination" th:if="${rowsPage.totalPages > 1}">
                <a class="btn secondary small" th:if="${rowsPage.hasPrevious()}"
                   th:href="@{/reports(from=${from},to=${to},customerId=${selectedCustomerId},productId=${selectedProductId},type=${selectedType},page=${rowsPage.number - 1},size=${rowsPage.size})}">Previous</a>
                <span th:text="${'Page ' + (rowsPage.number + 1) + ' of ' + rowsPage.totalPages}"></span>
                <a class="btn secondary small" th:if="${rowsPage.hasNext()}"
                   th:href="@{/reports(from=${from},to=${to},customerId=${selectedCustomerId},productId=${selectedProductId},type=${selectedType},page=${rowsPage.number + 1},size=${rowsPage.size})}">Next</a>
            </div>
            <p th:if="${#lists.isEmpty(rows)}" class="empty">No transactions match the selected filters.</p>
            <div class="table-wrap" th:if="${!#lists.isEmpty(rows)}"><table>
                <tr><th>Customer</th><th>Product</th><th>Date</th><th>Type</th><th>Credits</th><th>Balance After</th><th>Created By</th></tr>
                <tr th:each="row : ${rows}">
                    <td th:text="${row.customer}"></td><td th:text="${row.product}"></td><td th:text="${@appDateTime.format(row.date)}"></td><td th:text="${row.type}"></td>
                    <td th:class="${row.units.signum() < 0 ? 'negative' : 'positive'}" th:text="${@appDateTime.formatUnits(row.units)}"></td>
                    <td th:text="${@appDateTime.formatUnits(row.balanceAfter)}"></td><td th:text="${row.createdBy}"></td>
                </tr>
            </table></div>
        </section>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
