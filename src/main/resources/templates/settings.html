<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Settings')}"></head>
<body>
<div class="app">
    <aside th:replace="~{fragments :: sidebar}"></aside>
    <main class="content">
        <div th:replace="~{fragments :: topbar('Settings')}"></div>
        <div th:if="${error}" class="alert error" th:text="${error}"></div>
        <section class="card">
            <h2>Business Name</h2>
            <form th:action="@{/settings/business-name}" method="post">
                <label>Business Name</label>
                <input name="businessName" th:value="${businessName}" required>
                <button type="submit">Save Settings <span class="spinner"></span></button>
            </form>
        </section>
        <section class="card" style="margin-top:18px">
            <h2>Security</h2>
            <p class="muted">Manage authenticator app MFA for your admin account.</p>
            <a class="btn" th:href="@{/settings/security}">Manage Security</a>
        </section>
    </main>
</div>
<div th:if="${toast}" class="toast" th:text="${toast}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
